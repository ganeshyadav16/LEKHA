<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LocalCart — Sign In / Register</title>
  <meta name="description" content="Sign in or create a new account for LocalCart, the voice-powered kirana shop assistant." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #08080f;
      --bg-card:      rgba(16,16,30,0.88);
      --bg-input:     rgba(255,255,255,0.05);
      --border:       rgba(255,255,255,0.08);
      --border-focus: rgba(79,125,248,0.7);
      --text:         #e8e8f0;
      --text-muted:   #7070a0;
      --accent:       #4f7df8;
      --accent-2:     #9b6dff;
      --accent-glow:  rgba(79,125,248,0.35);
      --success:      #34d399;
      --danger:       #f87171;
      --radius:       16px;
      --radius-sm:    10px;
      --shadow:       0 24px 64px rgba(0,0,0,0.6);
      --font:         'Inter', sans-serif;
      --transition:   0.25s cubic-bezier(0.4,0,0.2,1);
    }

    html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--text); }

    /* ── Background ── */
    .bg-canvas { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
    .bg-canvas::before {
      content: ''; position: absolute; width: 900px; height: 900px; border-radius: 50%;
      background: radial-gradient(circle, rgba(79,125,248,0.12) 0%, transparent 70%);
      top: -300px; left: -200px; animation: drift1 18s ease-in-out infinite alternate;
    }
    .bg-canvas::after {
      content: ''; position: absolute; width: 700px; height: 700px; border-radius: 50%;
      background: radial-gradient(circle, rgba(155,109,255,0.10) 0%, transparent 70%);
      bottom: -250px; right: -100px; animation: drift2 22s ease-in-out infinite alternate;
    }
    .bg-blob3 {
      position: absolute; width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(54,214,231,0.07) 0%, transparent 70%);
      bottom: 10%; left: 30%; animation: drift1 14s ease-in-out infinite alternate-reverse;
    }
    .bg-grid {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    @keyframes drift1 { from{transform:translate(0,0) scale(1)} to{transform:translate(60px,40px) scale(1.1)} }
    @keyframes drift2 { from{transform:translate(0,0) scale(1)} to{transform:translate(-50px,-30px) scale(1.08)} }

    /* ── Page ── */
    .page { position: relative; z-index: 1; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }

    /* ── Card ── */
    .card {
      width: 100%; max-width: 460px;
      background: var(--bg-card);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 44px 40px 40px;
      box-shadow: var(--shadow), 0 0 0 1px rgba(255,255,255,0.04) inset;
      animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes slideUp { from{opacity:0;transform:translateY(28px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }

    /* ── Logo ── */
    .logo-area { text-align: center; margin-bottom: 28px; }
    .logo-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 64px; height: 64px; border-radius: 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 32px var(--accent-glow), 0 8px 24px rgba(0,0,0,0.4);
      font-size: 26px; color: #fff; margin-bottom: 16px; position: relative; overflow: hidden;
    }
    .logo-icon::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent); border-radius:inherit; }
    .logo-title {
      font-size: 24px; font-weight: 800; letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff 40%, var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 5px;
    }
    .logo-sub { font-size: 13px; color: var(--text-muted); }

    /* ── Mode toggle tabs ── */
    .mode-tabs {
      display: flex; background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 12px; padding: 4px; gap: 4px; margin-bottom: 28px;
    }
    .mode-tab {
      flex: 1; padding: 9px; border: none; border-radius: 9px; background: none;
      font-family: var(--font); font-size: 13.5px; font-weight: 600;
      color: var(--text-muted); cursor: pointer; transition: all 0.2s;
    }
    .mode-tab.active {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff; box-shadow: 0 4px 16px rgba(79,125,248,0.35);
    }

    /* ── Status badge ── */
    .status-row { display:flex; align-items:center; justify-content:center; gap:6px; margin-bottom:20px; }
    .status-dot { width:7px; height:7px; border-radius:50%; background:var(--text-muted); animation:pulse 2s ease infinite; }
    .status-dot.online { background:var(--success); }
    .status-dot.offline { background:var(--danger); animation:none; }
    .status-text { font-size:12px; color:var(--text-muted); font-weight:500; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── Alert ── */
    .alert { display:none; align-items:center; gap:10px; padding:11px 14px; border-radius:var(--radius-sm); font-size:13px; font-weight:500; margin-bottom:16px; animation:fadeIn 0.2s; }
    .alert.show { display:flex; }
    .alert-error   { background:rgba(248,113,113,0.1); border:1px solid rgba(248,113,113,0.3); color:#fca5a5; }
    .alert-success { background:rgba(52,211,153,0.1);  border:1px solid rgba(52,211,153,0.3);  color:#6ee7b7; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:translateY(0)} }

    /* ── Form fields ── */
    .form-group { margin-bottom: 16px; }
    .form-label { display:block; font-size:12px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:7px; }
    .input-wrap { position:relative; }
    .input-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:14px; pointer-events:none; transition:color 0.2s; }
    .form-input {
      width:100%; padding:12px 42px 12px 40px;
      background:var(--bg-input); border:1.5px solid var(--border);
      border-radius:var(--radius-sm); color:var(--text);
      font-family:var(--font); font-size:14px; outline:none;
      transition:border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .form-input::placeholder { color:var(--text-muted); }
    .form-input:focus { border-color:var(--accent); background:rgba(79,125,248,0.07); box-shadow:0 0 0 3px rgba(79,125,248,0.18); }
    .input-wrap:focus-within .input-icon { color:var(--accent); }
    .toggle-pw {
      position:absolute; right:12px; top:50%; transform:translateY(-50%);
      background:none; border:none; color:var(--text-muted); cursor:pointer; padding:4px; font-size:14px; transition:color 0.2s;
    }
    .toggle-pw:hover { color:var(--text); }

    /* ── Password strength bar ── */
    .strength-bar { display:none; margin-top:6px; }
    .strength-bar.show { display:block; }
    .strength-track { height:3px; background:rgba(255,255,255,0.08); border-radius:2px; overflow:hidden; margin-bottom:4px; }
    .strength-fill { height:100%; width:0%; border-radius:2px; transition:width 0.3s, background 0.3s; }
    .strength-label { font-size:11px; color:var(--text-muted); }

    /* ── Helper text ── */
    .field-hint { font-size:11px; color:var(--text-muted); margin-top:5px; }

    /* ── Checkbox ── */
    .form-meta { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; font-size:13px; }
    .remember-label { display:flex; align-items:center; gap:8px; cursor:pointer; color:var(--text-muted); user-select:none; }
    .remember-label input[type="checkbox"] { width:15px; height:15px; accent-color:var(--accent); cursor:pointer; }
    .forgot-link { color:var(--accent); text-decoration:none; font-weight:500; transition:opacity 0.2s; }
    .forgot-link:hover { opacity:0.75; }

    /* ── Submit btn ── */
    .btn-submit {
      width:100%; padding:13px; border:none; border-radius:var(--radius-sm);
      background:linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
      color:#fff; font-family:var(--font); font-size:15px; font-weight:700;
      letter-spacing:0.3px; cursor:pointer; position:relative; overflow:hidden;
      transition:opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow:0 6px 24px rgba(79,125,248,0.4);
    }
    .btn-submit::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent); opacity:0; transition:opacity 0.2s; }
    .btn-submit:hover:not(:disabled) { opacity:0.93; transform:translateY(-1px); box-shadow:0 10px 32px rgba(79,125,248,0.5); }
    .btn-submit:hover:not(:disabled)::before { opacity:1; }
    .btn-submit:active:not(:disabled) { transform:translateY(0); }
    .btn-submit:disabled { opacity:0.6; cursor:not-allowed; }
    .spinner { display:none; width:17px; height:17px; border:2.5px solid rgba(255,255,255,0.35); border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; vertical-align:middle; margin-right:7px; }
    .btn-submit.loading .spinner { display:inline-block; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* ── Divider ── */
    .divider { display:flex; align-items:center; gap:12px; margin:20px 0; color:var(--text-muted); font-size:11.5px; font-weight:600; text-transform:uppercase; letter-spacing:0.8px; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border); }

    /* ── Demo box ── */
    .demo-box {
      background:rgba(79,125,248,0.07); border:1px solid rgba(79,125,248,0.2); border-radius:var(--radius-sm);
      padding:12px 14px; font-size:12.5px; color:var(--text-muted); cursor:pointer;
      transition:background 0.2s, border-color 0.2s;
    }
    .demo-box:hover { background:rgba(79,125,248,0.12); border-color:rgba(79,125,248,0.4); }
    .demo-box-title { font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:0.9px; color:var(--accent); margin-bottom:6px; }
    .demo-creds { display:flex; gap:20px; }
    .demo-cred span:first-child { font-size:10.5px; text-transform:uppercase; letter-spacing:0.5px; display:block; margin-bottom:1px; }
    .demo-cred strong { font-size:13px; color:var(--text); font-weight:600; }

    /* ── Footer ── */
    .card-footer { text-align:center; margin-top:20px; font-size:12px; color:var(--text-muted); }
    .card-footer a { color:var(--accent); text-decoration:none; font-weight:500; }
    .card-footer a:hover { opacity:0.75; }

    /* ── Form panels (login / register) ── */
    .form-panel { display:none; }
    .form-panel.active { display:block; }

    /* ── Terms ── */
    .terms-label { display:flex; align-items:flex-start; gap:9px; cursor:pointer; font-size:12.5px; color:var(--text-muted); line-height:1.5; user-select:none; margin-bottom:18px; }
    .terms-label input { width:15px; height:15px; flex-shrink:0; margin-top:1px; accent-color:var(--accent); cursor:pointer; }
    .terms-label a { color:var(--accent); text-decoration:none; }

    @media (max-width: 480px) {
      .card { padding:32px 20px 28px; }
    }
  </style>
</head>
<body>

<div class="bg-canvas"><div class="bg-blob3"></div></div>
<div class="bg-grid"></div>

<main class="page">
  <div class="card" role="main">

    <!-- Logo -->
    <div class="logo-area">
      <div class="logo-icon"><i class="fas fa-store"></i></div>
      <div class="logo-title">LocalCart</div>
      <div class="logo-sub">Voice-Powered Kirana Assistant</div>
    </div>

    <!-- Mode Toggle -->
    <div class="mode-tabs" role="tablist">
      <button class="mode-tab active" id="tabLogin"    onclick="switchMode('login')"    role="tab">Sign In</button>
      <button class="mode-tab"        id="tabRegister" onclick="switchMode('register')" role="tab">Create Account</button>
    </div>

    <!-- Server Status -->
    <div class="status-row">
      <div class="status-dot" id="backendDot"></div>
      <span class="status-text" id="backendStatusText">Connecting to server…</span>
    </div>

    <!-- Alert -->
    <div class="alert" id="alertBox" role="alert">
      <i class="fas fa-exclamation-circle" id="alertIcon"></i>
      <span id="alertMsg"></span>
    </div>

    <!-- ══════════ LOGIN PANEL ══════════ -->
    <div class="form-panel active" id="panelLogin">
      <form id="loginForm" autocomplete="on" novalidate>

        <div class="form-group">
          <label class="form-label" for="loginUsername">Username</label>
          <div class="input-wrap">
            <i class="fas fa-user input-icon"></i>
            <input class="form-input" type="text" id="loginUsername" name="username"
                   placeholder="Enter your username" autocomplete="username" required spellcheck="false" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="loginPassword">Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock input-icon"></i>
            <input class="form-input" type="password" id="loginPassword" name="password"
                   placeholder="Enter your password" autocomplete="current-password" required />
            <button type="button" class="toggle-pw" onclick="togglePw('loginPassword',this)">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="form-meta">
          <label class="remember-label">
            <input type="checkbox" id="rememberMe" /> Remember me
          </label>
          <a href="#" class="forgot-link" onclick="forgotHint(event)">Forgot password?</a>
        </div>

        <button type="submit" class="btn-submit" id="loginBtn">
          <span class="spinner"></span>
          <span class="btn-text">Sign In</span>
        </button>
      </form>

      <div class="divider">Quick Access</div>
      <div class="demo-box" onclick="fillDemo()">
        <div class="demo-box-title"><i class="fas fa-bolt"></i> Demo Credentials — click to fill</div>
        <div class="demo-creds">
          <div class="demo-cred"><span>Username</span><strong>admin</strong></div>
          <div class="demo-cred"><span>Password</span><strong>admin123</strong></div>
        </div>
      </div>
    </div>

    <!-- ══════════ REGISTER PANEL ══════════ -->
    <div class="form-panel" id="panelRegister">
      <form id="registerForm" autocomplete="on" novalidate>

        <div class="form-group">
          <label class="form-label" for="regUsername">Username</label>
          <div class="input-wrap">
            <i class="fas fa-user input-icon"></i>
            <input class="form-input" type="text" id="regUsername" name="username"
                   placeholder="Choose a username (min 3 chars)" autocomplete="username" required spellcheck="false" />
          </div>
          <div class="field-hint">3–30 characters, letters and numbers only recommended.</div>
        </div>

        <div class="form-group">
          <label class="form-label" for="regPassword">Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock input-icon"></i>
            <input class="form-input" type="password" id="regPassword" name="password"
                   placeholder="Choose a strong password" autocomplete="new-password" required />
            <button type="button" class="toggle-pw" onclick="togglePw('regPassword',this)">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <!-- Strength meter -->
          <div class="strength-bar" id="strengthBar">
            <div class="strength-track"><div class="strength-fill" id="strengthFill"></div></div>
            <div class="strength-label" id="strengthLabel">Weak</div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="regConfirm">Confirm Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock-open input-icon"></i>
            <input class="form-input" type="password" id="regConfirm" name="confirmPassword"
                   placeholder="Re-enter your password" autocomplete="new-password" required />
            <button type="button" class="toggle-pw" onclick="togglePw('regConfirm',this)">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <label class="terms-label">
          <input type="checkbox" id="agreeTerms" required />
          I agree to the <a href="#" onclick="return false">Terms of Service</a> and
          <a href="#" onclick="return false">Privacy Policy</a>
        </label>

        <button type="submit" class="btn-submit" id="registerBtn">
          <span class="spinner"></span>
          <span class="btn-text"><i class="fas fa-user-plus"></i> Create Account</span>
        </button>
      </form>
    </div>

    <!-- Footer -->
    <div class="card-footer">
      <a href="index.html"><i class="fas fa-arrow-left" style="font-size:11px"></i> Back to app</a>
      &nbsp;·&nbsp; LocalCart v2.0
    </div>

  </div>
</main>

<script>
  /* ── Config ── */
  const BACKEND   = 'http://127.0.0.1:5005';
  const TOKEN_KEY = 'lc_auth_token';
  const USER_KEY  = 'lc_auth_user';

  /* ── Already logged in? ── */
  if (sessionStorage.getItem(TOKEN_KEY) || localStorage.getItem(TOKEN_KEY)) {
    window.location.replace('index.html');
  }

  /* ── Backend health ── */
  async function checkHealth() {
    const dot  = document.getElementById('backendDot');
    const text = document.getElementById('backendStatusText');
    try {
      const r = await fetch(`${BACKEND}/health`, { signal: AbortSignal.timeout(3000) });
      if (r.ok) { dot.className = 'status-dot online'; text.textContent = 'Server online · Ready'; return true; }
    } catch (_) {}
    dot.className = 'status-dot offline';
    text.textContent = 'Server offline · running in local mode';
    return false;
  }
  checkHealth();

  /* ── Mode switching ── */
  let currentMode = 'login';
  function switchMode(mode) {
    currentMode = mode;
    document.getElementById('panelLogin').classList.toggle('active', mode === 'login');
    document.getElementById('panelRegister').classList.toggle('active', mode === 'register');
    document.getElementById('tabLogin').classList.toggle('active', mode === 'login');
    document.getElementById('tabRegister').classList.toggle('active', mode === 'register');
    hideAlert();
    if (mode === 'login') document.getElementById('loginUsername').focus();
    else document.getElementById('regUsername').focus();
  }

  /* ── Alert helpers ── */
  function showAlert(msg, type = 'error') {
    const box  = document.getElementById('alertBox');
    const icon = document.getElementById('alertIcon');
    box.className = `alert alert-${type} show`;
    icon.className = type === 'error' ? 'fas fa-exclamation-circle' : 'fas fa-check-circle';
    document.getElementById('alertMsg').textContent = msg;
  }
  function hideAlert() { document.getElementById('alertBox').classList.remove('show'); }

  /* ── Toggle password eye ── */
  function togglePw(inputId, btn) {
    const inp = document.getElementById(inputId);
    const isText = inp.type === 'text';
    inp.type = isText ? 'password' : 'text';
    btn.querySelector('i').className = isText ? 'fas fa-eye' : 'fas fa-eye-slash';
  }

  /* ── Password strength ── */
  document.getElementById('regPassword').addEventListener('input', function () {
    const val = this.value;
    const bar  = document.getElementById('strengthBar');
    const fill = document.getElementById('strengthFill');
    const lbl  = document.getElementById('strengthLabel');
    if (!val) { bar.classList.remove('show'); return; }
    bar.classList.add('show');
    let score = 0;
    if (val.length >= 6)  score++;
    if (val.length >= 10) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const levels = [
      { w:'20%',  bg:'#f87171', label:'Very Weak' },
      { w:'40%',  bg:'#fb923c', label:'Weak'      },
      { w:'60%',  bg:'#facc15', label:'Fair'      },
      { w:'80%',  bg:'#4ade80', label:'Good'      },
      { w:'100%', bg:'#22c55e', label:'Strong 💪'  },
    ];
    const lvl = levels[Math.min(score, 4)];
    fill.style.width = lvl.w;
    fill.style.background = lvl.bg;
    lbl.textContent = lvl.label;
    lbl.style.color = lvl.bg;
  });

  /* ── Confirm password live check ── */
  document.getElementById('regConfirm').addEventListener('input', function () {
    const pw = document.getElementById('regPassword').value;
    this.style.borderColor = this.value && this.value !== pw ? '#f87171' : '';
  });

  /* ── Restore remembered username ── */
  const savedUser = localStorage.getItem('lc_remembered_user');
  if (savedUser) { document.getElementById('loginUsername').value = savedUser; document.getElementById('rememberMe').checked = true; }

  /* ── Fill demo creds ── */
  function fillDemo() {
    document.getElementById('loginUsername').value = 'admin';
    document.getElementById('loginPassword').value = 'admin123';
    hideAlert();
    const box = document.querySelector('.demo-box');
    box.style.background = 'rgba(79,125,248,0.22)';
    setTimeout(() => box.style.background = '', 500);
  }

  /* ── Auth token store helper ── */
  function storeAuth(token, user, remember) {
    const storage = remember ? localStorage : sessionStorage;
    storage.setItem(TOKEN_KEY, token);
    storage.setItem(USER_KEY, JSON.stringify(user));
  }

  /* ── Generic API call ── */
  async function apiPost(path, body) {
    const res  = await fetch(`${BACKEND}${path}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
      signal: AbortSignal.timeout(8000),
    });
    const json = await res.json().catch(() => ({}));
    return { ok: res.ok, status: res.status, body: json };
  }

  /* ── LOGIN form ── */
  document.getElementById('loginForm').addEventListener('submit', async e => {
    e.preventDefault();
    hideAlert();
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    const remember = document.getElementById('rememberMe').checked;

    if (!username) { showAlert('Please enter your username.'); return; }
    if (!password)  { showAlert('Please enter your password.'); return; }

    const btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.classList.add('loading');
    btn.querySelector('.btn-text').textContent = 'Signing in…';

    try {
      const { ok, body } = await apiPost('/login', { username, password });
      if (ok && body.ok) {
        const { token, user } = body.data;
        storeAuth(token, user, remember);
        if (remember) localStorage.setItem('lc_remembered_user', username);
        else localStorage.removeItem('lc_remembered_user');
        showAlert(`Welcome back, ${user.username}! Redirecting…`, 'success');
        setTimeout(() => window.location.replace('index.html'), 900);
      } else {
        showAlert(body.message || 'Invalid credentials. Please try again.');
        document.getElementById('loginPassword').value = '';
      }
    } catch (err) {
      // Offline fallback
      if (username === 'admin' && password === 'admin123') {
        storeAuth('offline-demo-token', { id:1, username:'admin' }, remember);
        showAlert('Backend offline — continuing in local mode.', 'success');
        setTimeout(() => window.location.replace('index.html'), 900);
      } else {
        showAlert('Cannot reach server. Check backend is running on port 5005.');
      }
    } finally {
      btn.disabled = false; btn.classList.remove('loading');
      btn.querySelector('.btn-text').textContent = 'Sign In';
    }
  });

  /* ── REGISTER form ── */
  document.getElementById('registerForm').addEventListener('submit', async e => {
    e.preventDefault();
    hideAlert();
    const username        = document.getElementById('regUsername').value.trim();
    const password        = document.getElementById('regPassword').value;
    const confirmPassword = document.getElementById('regConfirm').value;
    const agreed          = document.getElementById('agreeTerms').checked;

    if (!username)    { showAlert('Please enter a username.'); return; }
    if (username.length < 3) { showAlert('Username must be at least 3 characters.'); return; }
    if (!password)    { showAlert('Please enter a password.'); return; }
    if (password.length < 6) { showAlert('Password must be at least 6 characters.'); return; }
    if (password !== confirmPassword) { showAlert('Passwords do not match.'); return; }
    if (!agreed)      { showAlert('Please agree to the Terms of Service to continue.'); return; }

    const btn = document.getElementById('registerBtn');
    btn.disabled = true; btn.classList.add('loading');
    btn.querySelector('.btn-text').textContent = 'Creating account…';

    try {
      const { ok, status, body } = await apiPost('/register', { username, password, confirmPassword });
      if (ok && body.ok) {
        const { token, user } = body.data;
        storeAuth(token, user, false);
        showAlert(`Account created! Welcome, ${user.username} 🎉`, 'success');
        setTimeout(() => window.location.replace('index.html'), 1000);
      } else {
        showAlert(body.message || (status === 409 ? 'Username already taken.' : 'Registration failed.'));
      }
    } catch (_) {
      showAlert('Cannot reach server. Please make sure the backend is running.');
    } finally {
      btn.disabled = false; btn.classList.remove('loading');
      btn.querySelector('.btn-text').innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
    }
  });

  /* ── Forgot hint ── */
  function forgotHint(e) {
    e.preventDefault();
    showAlert('Contact your admin to reset your password. Default: admin / admin123');
  }

  /* ── Enter key flow ── */
  document.getElementById('loginUsername').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); document.getElementById('loginPassword').focus(); }
  });
  document.getElementById('regUsername').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); document.getElementById('regPassword').focus(); }
  });
  document.getElementById('regPassword').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); document.getElementById('regConfirm').focus(); }
  });
</script>
</body>
</html>
